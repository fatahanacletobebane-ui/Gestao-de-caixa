<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moz Caixa - Sistema Profissional</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { background-color: #f1f5f9; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .hidden { display: none !important; }
        .active-tab { color: #7c3aed; border-bottom: 3px solid #7c3aed; }
        .card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="pb-24">

    <div id="authScreen" class="fixed inset-0 bg-violet-700 z-[100] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
            <h1 class="text-2xl font-black text-center text-violet-700 mb-6">Moz Caixa 🚀</h1>
            
            <div id="loginForm">
                <input type="email" id="email" placeholder="Email" class="w-full p-4 bg-gray-100 rounded-xl mb-3 outline-none">
                <input type="password" id="pass" placeholder="Senha" class="w-full p-4 bg-gray-100 rounded-xl mb-4 outline-none">
                <button onclick="handleLogin()" class="w-full bg-violet-600 text-white py-4 rounded-xl font-bold mb-4">Entrar</button>
                <p class="text-center text-sm text-gray-500">Não tem conta? <button onclick="toggleAuth()" class="text-violet-600 font-bold">Registar</button></p>
            </div>

            <div id="registerForm" class="hidden">
                <input type="text" id="regEmpresa" placeholder="Nome da Empresa" class="w-full p-3 bg-gray-100 rounded-xl mb-2">
                <input type="text" id="regNuit" placeholder="NUIT" class="w-full p-3 bg-gray-100 rounded-xl mb-2">
                <input type="email" id="regEmail" placeholder="Email" class="w-full p-3 bg-gray-100 rounded-xl mb-2">
                <input type="password" id="regPass" placeholder="Senha" class="w-full p-3 bg-gray-100 rounded-xl mb-3">
                <button onclick="handleRegister()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold mb-4">Criar Conta</button>
                <button onclick="toggleAuth()" class="w-full text-gray-400 text-sm">Voltar ao Login</button>
            </div>
        </div>
    </div>

    <div id="lockScreen" class="fixed inset-0 bg-black/95 z-[110] hidden flex flex-col items-center justify-center p-8 text-center">
        <i class="fas fa-lock text-6xl text-amber-500 mb-6"></i>
        <h2 id="lockMsg" class="text-white text-xl font-bold mb-6">Limite de 50 vendas atingido!</h2>
        <input type="text" id="codAtivacao" placeholder="Código de Ativação" class="w-full max-w-xs p-4 rounded-xl text-center mb-4">
        <button onclick="ativarPro()" class="bg-amber-500 text-white px-10 py-4 rounded-xl font-bold">ATIVAR PRO</button>
    </div>

    <header class="bg-white p-4 flex justify-between items-center border-b sticky top-0 z-40">
        <div>
            <h2 id="displayEmpresa" class="font-bold text-gray-800">Minha Loja</h2>
            <p id="displayStatus" class="text-[10px] text-orange-500 uppercase font-black">Modo Teste</p>
        </div>
        <button onclick="auth.signOut()" class="text-red-500 text-sm font-bold">Sair</button>
    </header>

    <main class="p-4">
        
        <section id="sec-vendas">
            <input type="text" id="busca" oninput="renderPOS()" placeholder="🔍 Procurar produto..." class="w-full p-4 rounded-2xl border-none shadow-sm mb-4">
            
            <div id="gridProdutos" class="grid grid-cols-2 gap-3 mb-6"></div>

            <div class="card">
                <h3 class="font-black mb-3 border-b pb-2"><i class="fas fa-shopping-basket mr-2"></i>Carrinho</h3>
                <div id="listaCarrinho" class="space-y-2 mb-4 max-h-48 overflow-y-auto"></div>
                <div class="flex justify-between text-xl font-black">
                    <span>Total:</span>
                    <span id="totalCarrinho">0.00 MT</span>
                </div>
                <button onclick="finalizarVenda()" class="w-full bg-violet-600 text-white py-4 rounded-2xl mt-4 font-bold shadow-lg shadow-violet-200">FINALIZAR VENDA</button>
            </div>
        </section>

        <section id="sec-estoque" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-black text-xl">Inventário</h2>
                <button onclick="abrirModalProduto()" class="bg-black text-white px-4 py-2 rounded-lg text-sm">+ Adicionar</button>
            </div>
            <div id="listaEstoque" class="space-y-3"></div>
        </section>

        <section id="sec-relatorios" class="hidden text-center">
            <h2 class="font-black text-xl mb-4">Resumo Diário</h2>
            <div class="grid grid-cols-1 gap-4">
                <div class="card bg-violet-50">
                    <p class="text-sm text-violet-600 font-bold uppercase">Total Vendido</p>
                    <h4 id="relTotal" class="text-3xl font-black">0.00 MT</h4>
                </div>
                <div class="card bg-green-50">
                    <p class="text-sm text-green-600 font-bold uppercase">Lucro Líquido</p>
                    <h4 id="relLucro" class="text-3xl font-black">0.00 MT</h4>
                </div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 z-50">
        <button onclick="nav('vendas')" id="nav-vendas" class="active-tab flex flex-col items-center">
            <i class="fas fa-cash-register text-xl"></i><span class="text-[10px] font-bold">Caixa</span>
        </button>
        <button onclick="nav('estoque')" id="nav-estoque" class="flex flex-col items-center text-gray-400">
            <i class="fas fa-boxes text-xl"></i><span class="text-[10px] font-bold">Estoque</span>
        </button>
        <button onclick="nav('relatorios')" id="nav-relatorios" class="flex flex-col items-center text-gray-400">
            <i class="fas fa-chart-pie text-xl"></i><span class="text-[10px] font-bold">Relatórios</span>
        </button>
    </nav>

    <div id="modalProd" class="fixed inset-0 bg-black/60 z-[120] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6">
            <h3 class="font-black text-lg mb-4">Novo Produto</h3>
            <div class="space-y-3">
                <input type="text" id="pNome" placeholder="Nome do Produto" class="w-full p-3 bg-gray-50 rounded-xl border">
                <div class="flex gap-2">
                    <input type="number" id="pPreco" placeholder="Preço Venda" class="w-1/2 p-3 bg-gray-50 rounded-xl border">
                    <input type="number" id="pCusto" placeholder="Preço Custo" class="w-1/2 p-3 bg-gray-50 rounded-xl border">
                </div>
                <input type="number" id="pQtd" placeholder="Quantidade" class="w-full p-3 bg-gray-50 rounded-xl border">
                <select id="pDivida" class="w-full p-3 bg-gray-50 rounded-xl border">
                    <option value="Não">Sem dívida com fornecedor</option>
                    <option value="Sim">Com dívida com fornecedor</option>
                </select>
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="fecharModal()" class="flex-1 py-3 text-gray-400 font-bold">Cancelar</button>
                <button onclick="salvarProduto()" class="flex-1 py-3 bg-violet-600 text-white rounded-xl font-bold">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBtEE6FKPFH9Bv2DhZNlb865iVsaX_2kpw",
            authDomain: "casa-de-jogos-ed385.firebaseapp.com",
            databaseURL: "https://casa-de-jogos-ed385-default-rtdb.firebaseio.com",
            projectId: "casa-de-jogos-ed385",
            storageBucket: "casa-de-jogos-ed385.firebasestorage.app",
            messagingSenderId: "400751100510",
            appId: "1:400751100510:web:e195695191607d02e46acf"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let userState = null;
        let localProducts = [];
        let cart = [];

        // PERSISTÊNCIA E LOGIN
        auth.onAuthStateChanged(user => {
            if (user) {
                userState = user;
                document.getElementById('authScreen').classList.add('hidden');
                syncData();
            } else {
                document.getElementById('authScreen').classList.remove('hidden');
            }
        });

        async function handleLogin() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert(err.message); }
        }

        async function handleRegister() {
            const e = document.getElementById('regEmail').value;
            const p = document.getElementById('regPass').value;
            const n = document.getElementById('regEmpresa').value;
            const nuit = document.getElementById('regNuit').value;

            try {
                const res = await auth.createUserWithEmailAndPassword(e, p);
                await db.ref(`users/${res.user.uid}/profile`).set({
                    nomeEmpresa: n,
                    nuit: nuit,
                    activacaoPro: "OFF",
                    prazo: "2026-12-31",
                    vendasContador: 0
                });
            } catch(err) { alert(err.message); }
        }

        // SINCRONIZAÇÃO E SEGURANÇA
        function syncData() {
            // Perfil e Travas
            db.ref(`users/${userState.uid}/profile`).on('value', snap => {
                const p = snap.val();
                document.getElementById('displayEmpresa').innerText = p.nomeEmpresa;
                
                const agora = new Date().getTime();
                const dataPrazo = new Date(p.prazo).getTime();

                if (p.activacaoPro === "OFF" && p.vendasContador >= 50) {
                    showLock("Limite de 50 vendas atingido!");
                } else if (p.activacaoPro !== "OFF" && agora > dataPrazo) {
                    showLock("Prazo de licença expirado!");
                } else {
                    document.getElementById('lockScreen').classList.add('hidden');
                    if(p.activacaoPro !== "OFF") {
                        document.getElementById('displayStatus').innerText = "Nível PRO Activo";
                        document.getElementById('displayStatus').className = "text-[10px] text-green-500 uppercase font-black";
                    }
                }
            });

            // Produtos
            db.ref(`users/${userState.uid}/products`).on('value', snap => {
                localProducts = [];
                snap.forEach(c => { localProducts.push({ id: c.key, ...c.val() }); });
                renderPOS();
                renderStock();
            });

            // Relatórios
            db.ref(`users/${userState.uid}/sales`).on('value', snap => {
                let totalVendas = 0; let totalLucro = 0;
                const hoje = new Date().toISOString().split('T')[0];
                snap.forEach(s => {
                    const v = s.val();
                    if(v.data === hoje) {
                        totalVendas += v.total;
                        totalLucro += v.lucro;
                    }
                });
                document.getElementById('relTotal').innerText = totalVendas.toFixed(2) + " MT";
                document.getElementById('relLucro').innerText = totalLucro.toFixed(2) + " MT";
            });
        }

        function showLock(msg) {
            document.getElementById('lockScreen').classList.remove('hidden');
            document.getElementById('lockMsg').innerText = msg;
        }

        // LÓGICA DE ESTOQUE
        function salvarProduto() {
            const nome = document.getElementById('pNome').value;
            const preco = parseFloat(document.getElementById('pPreco').value);
            const custo = parseFloat(document.getElementById('pCusto').value);
            const qtd = parseInt(document.getElementById('pQtd').value);
            const div = document.getElementById('pDivida').value;

            if(!nome || !preco) return alert("Dados incompletos");

            db.ref(`users/${userState.uid}/products`).push({
                nome, preco, custo, qtd, div, lucroUnitario: (preco - custo)
            });
            fecharModal();
        }

        function renderStock() {
            const list = document.getElementById('listaEstoque');
            list.innerHTML = localProducts.map(p => `
                <div class="card flex justify-between items-center">
                    <div>
                        <p class="font-bold">${p.nome}</p>
                        <p class="text-xs text-gray-400">Preço: ${p.preco} MT | Lucro: ${p.lucroUnitario} MT</p>
                    </div>
                    <div class="text-right">
                        <p class="text-lg font-black ${p.qtd <= 0 ? 'text-red-500' : 'text-violet-600'}">${p.qtd}</p>
                        <p class="text-[10px] font-bold uppercase">Em Stock</p>
                    </div>
                </div>
            `).join('');
        }

        // LÓGICA DE VENDAS
        function renderPOS() {
            const busca = document.getElementById('busca').value.toLowerCase();
            const grid = document.getElementById('gridProdutos');
            grid.innerHTML = localProducts
                .filter(p => p.nome.toLowerCase().includes(busca) && p.qtd > 0)
                .map(p => `
                    <div onclick="addCarrinho('${p.id}')" class="card active:scale-95 transition text-center">
                        <p class="font-bold text-sm truncate">${p.nome}</p>
                        <p class="text-violet-600 font-black">${p.preco.toFixed(2)} MT</p>
                        <p class="text-[9px] text-gray-400">Stock: ${p.qtd}</p>
                    </div>
                `).join('');
        }

        function addCarrinho(id) {
            const p = localProducts.find(x => x.id === id);
            const exist = cart.find(x => x.id === id);
            if(exist) {
                if(exist.qty < p.qty) exist.qty++;
            } else {
                cart.push({ ...p, qty: 1 });
            }
            atualizarCarrinhoUI();
        }

        function atualizarCarrinhoUI() {
            const lista = document.getElementById('listaCarrinho');
            lista.innerHTML = cart.map(i => `
                <div class="flex justify-between text-sm bg-gray-50 p-2 rounded-lg">
                    <span>${i.nome} x${i.qty}</span>
                    <span class="font-bold">${(i.preco * i.qty).toFixed(2)}</span>
                </div>
            `).join('');
            const total = cart.reduce((a, b) => a + (b.preco * b.qty), 0);
            document.getElementById('totalCarrinho').innerText = total.toFixed(2) + " MT";
        }

        async function finalizarVenda() {
            if(cart.length === 0) return;
            
            const total = cart.reduce((a, b) => a + (b.preco * b.qty), 0);
            const lucroTotal = cart.reduce((a, b) => a + (b.lucroUnitario * b.qty), 0);
            const hoje = new Date().toISOString().split('T')[0];

            // 1. Gravar Venda
            await db.ref(`users/${userState.uid}/sales`).push({
                items: cart,
                total: total,
                lucro: lucroTotal,
                data: hoje,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            // 2. Abater Estoque e Incrementar Contador
            for(let item of cart) {
                db.ref(`users/${userState.uid}/products/${item.id}/qtd`).set(firebase.database.ServerValue.increment(-item.qty));
            }
            db.ref(`users/${userState.uid}/profile/vendasContador`).set(firebase.database.ServerValue.increment(1));

            alert("Venda com Sucesso!");
            cart = [];
            atualizarCarrinhoUI();
        }

        // NAVEGAÇÃO E MODAIS
        function nav(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab', 'text-gray-400'));
            document.getElementById('nav-' + id).classList.add('active-tab');
        }

        function toggleAuth() {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('registerForm').classList.toggle('hidden');
        }

        function abrirModalProduto() { document.getElementById('modalProd').classList.remove('hidden'); }
        function fecharModal() { document.getElementById('modalProd').classList.add('hidden'); }
    </script>
</body>
</html>
